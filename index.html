<!DOCTYPE html>
<html>
<head>
  <title>AutoHide Pro</title>
  <script src="https://unpkg.com/@shopify/app-bridge"></script>
  <script src="https://unpkg.com/@shopify/polaris"></script>
</head>
<body>
  <div id="app"></div>

  <script>
    document.getElementById("app").innerHTML = `
      <h1>AutoHide Pro Settings</h1>
      <label><input type="checkbox" id="hideVariants"> Hide Variants Instead of Products</label><br>
      <label><input type="checkbox" id="lowStock"> Send Low Stock Email</label><br>
      <label>Low Stock Threshold: <input type="number" id="threshold" value="3"></label><br>
      <button onclick="save()">Save</button>
    `;

    async function save() {
      await fetch("/settings/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          hideVariants: document.getElementById("hideVariants").checked,
          lowStock: document.getElementById("lowStock").checked,
          threshold: document.getElementById("threshold").value
        })
      });
      alert("Settings saved");
    }
  </script>
</body>
</html>
